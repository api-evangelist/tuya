specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Tuya
providerId: tuya
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - IoT
  - Smart Home
  - Cloud Platform
  - Rate Limiting
description: Tuya documents that its IoT cloud handles 100M+ daily device requests and references rate-limit
  / API-call rules in its developer portal, but the public landing pages did not surface concrete per-second
  / per-minute numbers during reconciliation. Effective limits are documented per API in the developer
  console and may differ between trial and commercial Cloud Development Packages.
sources:
  - https://developer.tuya.com/en/docs/iot/api-reference?id=Kbd2pu2ompov0
  - https://developer.tuya.com/
notes: No public per-second / per-minute numbers reachable from the public marketing site; Tuya's per-API
  rate-limit page is referenced from the developer portal and varies by service.
limits:
  - name: Per-API Cloud Limits
    scope: project/api-key
    metric: varies
    limit: see Tuya developer portal API reference
    notes: Each cloud API documents its own QPS / quota limits inside the developer portal; numbers vary
      by service and by Cloud Development Package tier.
policies:
  - name: Per-Project / Per-Key Scoping
    description: Tuya scopes API call quotas to the developer project and access key (Client ID / Secret);
      throttling is applied at that level rather than globally per account.
  - name: Trial vs Commercial Quotas
    description: Trial-tier developer projects receive smaller cloud quotas than projects with a commercial
      Cloud Development Package; upgrade is required to lift them.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
