providerId: tuya
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - IoT
  - Smart Home
  - Cloud Platform
  - Developer Platform
description: Tuya operates the Tuya IoT Development Platform, with developer accounts that get free trial-tier
  cloud quotas and paid commercial packages negotiated per project. The public marketing site does not
  publish a self-serve price list — the canonical /pricing endpoint returned a 404 during reconciliation
  and the developer portal exposes plans through console-side product packages rather than a public catalog.
sources:
  - https://developer.tuya.com/
  - https://www.tuya.com/
notes: No public self-serve price list. Tuya distinguishes a free Developer / Trial tier (used for evaluation)
  from commercial Cloud Development Packages quoted per project; specific prices were not reachable via
  the public web.
plans:
  - id: tuya-contact-sales
    name: Contact Sales
    type: enterprise
    description: Custom-quoted Tuya Cloud Development engagement covering device APIs, IoT Core, AI services,
      and value-added cloud services. Specific package prices are not published; contact Tuya for a quote
      sized to device count, region, and service mix.
    entries:
      - label: Cloud Development Package
        name: cloud_development_package
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Tuya IoT Development Platform Access
      - name: Cloud APIs
      - name: Device Management
      - name: AI / Cloud Services
