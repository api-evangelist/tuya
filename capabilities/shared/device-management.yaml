naftiko: "1.0.0-alpha1"

info:
  label: "Tuya Device Management API"
  description: "Query, control, and manage IoT devices registered to a Tuya cloud project. Covers device information, control commands, logs, sub-devices, and user-device associations."
  tags:
    - Tuya
    - IoT
    - Device Management
    - Smart Home
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TUYA_ACCESS_ID: TUYA_ACCESS_ID
      TUYA_ACCESS_SECRET: TUYA_ACCESS_SECRET

capability:
  consumes:
    - type: http
      namespace: tuya-devices
      baseUri: https://openapi.tuyaus.com
      description: "Tuya Device Management API"
      authentication:
        type: apikey
        key: client_id
        value: "{{TUYA_ACCESS_ID}}"
        placement: header
      resources:
        - name: devices
          path: /v1.0/devices/{device_id}
          description: "Manage individual devices"
          operations:
            - name: get-device
              method: GET
              description: "Get device details including status and attributes"
              inputParameters:
                - name: device_id
                  in: path
                  type: string
                  required: true
                  description: "Unique device identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-device
              method: PUT
              description: "Update device name"
              inputParameters:
                - name: device_id
                  in: path
                  type: string
                  required: true
                  description: "Unique device identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
            - name: remove-device
              method: DELETE
              description: "Remove a device from the account"
              inputParameters:
                - name: device_id
                  in: path
                  type: string
                  required: true
                  description: "Unique device identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: device-list
          path: /v1.0/devices
          description: "List and search devices"
          operations:
            - name: list-devices
              method: GET
              description: "Query devices by project"
              inputParameters:
                - name: device_ids
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated device IDs"
                - name: page_size
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: device-commands
          path: /v1.0/devices/{device_id}/commands
          description: "Send device control commands"
          operations:
            - name: send-commands
              method: POST
              description: "Send control commands to a device"
              inputParameters:
                - name: device_id
                  in: path
                  type: string
                  required: true
                  description: "Unique device identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  commands: "{{tools.commands}}"
        - name: device-status
          path: /v1.0/devices/{device_id}/status
          description: "Get device data point status"
          operations:
            - name: get-device-status
              method: GET
              description: "Get current status of all device data points"
              inputParameters:
                - name: device_id
                  in: path
                  type: string
                  required: true
                  description: "Unique device identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: device-logs
          path: /v1.0/devices/{device_id}/logs
          description: "Query device operation logs"
          operations:
            - name: get-device-logs
              method: GET
              description: "Get device operation and event logs"
              inputParameters:
                - name: device_id
                  in: path
                  type: string
                  required: true
                  description: "Unique device identifier"
                - name: type
                  in: query
                  type: integer
                  required: true
                  description: "Log type (1=device, 7=automation)"
                - name: start_time
                  in: query
                  type: integer
                  required: false
                  description: "Start timestamp in milliseconds"
                - name: end_time
                  in: query
                  type: integer
                  required: false
                  description: "End timestamp in milliseconds"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: tuya-device-management-api
      resources:
        - path: /v1/devices
          name: devices
          description: "List devices"
          operations:
            - method: GET
              name: list-devices
              description: "List all devices"
              call: "tuya-devices.list-devices"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/devices/{device_id}
          name: device
          description: "Manage a device"
          operations:
            - method: GET
              name: get-device
              description: "Get device details"
              call: "tuya-devices.get-device"
              with:
                device_id: "rest.device_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/devices/{device_id}/commands
          name: device-commands
          description: "Send device commands"
          operations:
            - method: POST
              name: send-commands
              description: "Control a device"
              call: "tuya-devices.send-commands"
              with:
                device_id: "rest.device_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: tuya-device-management-mcp
      transport: http
      tools:
        - name: get-device
          description: "Get IoT device details including online status and current data points"
          hints:
            readOnly: true
            openWorld: false
          call: "tuya-devices.get-device"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-devices
          description: "List IoT devices registered to the project"
          hints:
            readOnly: true
            openWorld: true
          call: "tuya-devices.list-devices"
          outputParameters:
            - type: object
              mapping: "$."
        - name: send-device-commands
          description: "Send control commands to an IoT device (e.g., turn on/off, set brightness)"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "tuya-devices.send-commands"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-device-status
          description: "Get the current status of all data points for an IoT device"
          hints:
            readOnly: true
            openWorld: false
          call: "tuya-devices.get-device-status"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-device-logs
          description: "Query operation and event logs for an IoT device"
          hints:
            readOnly: true
            openWorld: true
          call: "tuya-devices.get-device-logs"
          outputParameters:
            - type: object
              mapping: "$."
