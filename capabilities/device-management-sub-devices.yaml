naftiko: 1.0.0-alpha2
info:
  label: Tuya Device Management API — Sub Devices
  description: 'Tuya Device Management API — Sub Devices. 1 operations. Lead operation: List Sub Devices. Self-contained Naftiko
    capability covering one Tuya business surface.'
  tags:
  - Tuya
  - Sub Devices
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TUYA_API_KEY: TUYA_API_KEY
capability:
  consumes:
  - type: http
    namespace: device-management-sub-devices
    baseUri: https://openapi.tuyaus.com
    description: Tuya Device Management API — Sub Devices business capability. Self-contained, no shared references.
    resources:
    - name: v1.0-devices-device_id-sub-devices
      path: /v1.0/devices/{device_id}/sub-devices
      operations:
      - name: listsubdevices
        method: GET
        description: List Sub Devices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: client_id
      value: '{{env.TUYA_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: device-management-sub-devices-rest
    port: 8080
    description: REST adapter for Tuya Device Management API — Sub Devices. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1-0/devices/{device-id}/sub-devices
      name: v1-0-devices-device-id-sub-devices
      description: REST surface for v1.0-devices-device_id-sub-devices.
      operations:
      - method: GET
        name: listsubdevices
        description: List Sub Devices
        call: device-management-sub-devices.listsubdevices
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: device-management-sub-devices-mcp
    port: 9090
    transport: http
    description: MCP adapter for Tuya Device Management API — Sub Devices. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-sub-devices
      description: List Sub Devices
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: device-management-sub-devices.listsubdevices
      outputParameters:
      - type: object
        mapping: $.
