        mapping: $.
    - name: remove-device-user
      description: Remove Device User
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: device-management-device-users.removedeviceuser
      with:
        user_id: tools.user_id
      outputParameters:
      - type: object
        mapping: $.
