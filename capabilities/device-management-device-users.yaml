    description: Tuya Device Management API — Device Users business capability. Self-contained, no shared references.
    resources:
    - name: v1.0-devices-device_id-users
      path: /v1.0/devices/{device_id}/users
      operations:
      - name: adddeviceuser
        method: POST
        description: Add Device User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1.0-devices-device_id-users-user_id
      path: /v1.0/devices/{device_id}/users/{user_id}
      operations:
      - name: getdeviceuser
        method: GET
        description: Get Device User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: user_id
          in: path
          type: string
          description: User ID
          required: true
      - name: updatedeviceuser
        method: PUT
        description: Update Device User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: user_id
          in: path
          type: string
          description: User ID
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: removedeviceuser
        method: DELETE
        description: Remove Device User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: user_id
          in: path
          type: string
          description: User ID
          required: true
    authentication:
      type: apikey
      key: client_id
      value: '{{env.TUYA_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: device-management-device-users-rest
    port: 8080
    description: REST adapter for Tuya Device Management API — Device Users. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1-0/devices/{device-id}/users
      name: v1-0-devices-device-id-users
      description: REST surface for v1.0-devices-device_id-users.
      operations:
      - method: POST
        name: adddeviceuser
        description: Add Device User
        call: device-management-device-users.adddeviceuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
