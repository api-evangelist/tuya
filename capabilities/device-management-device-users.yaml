naftiko: 1.0.0-alpha2
info:
  label: Tuya Device Management API — Device Users
  description: 'Tuya Device Management API — Device Users. 4 operations. Lead operation: Add Device User. Self-contained Naftiko
    capability covering one Tuya business surface.'
  tags:
  - Tuya
  - Device Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TUYA_API_KEY: TUYA_API_KEY
capability:
