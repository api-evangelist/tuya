      description: Add Device User
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: device-management-device-users.adddeviceuser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-device-user
