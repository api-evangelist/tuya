description: Tuya operates the Tuya IoT Development Platform with project-scoped cloud usage; no public
  self-serve price list or FOCUS-aligned billing export is published, and Cloud Development Packages are
  quoted per project. FinOps shape is therefore documented at the Contact Sales level pending vendor disclosure.
sources:
  - https://developer.tuya.com/
  - https://www.tuya.com/
notes: No public pricing endpoint reachable; Cloud Development Package prices are quoted per engagement.
  Meters listed reflect typical IoT-platform billable lines but per-unit prices are not public.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Tuya Inc.
serviceCategory: IoT Cloud Platform
billingModel:
  pricingCategory: Contract
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Tuya IoT Development Platform
  ServiceCategory: IoT Cloud Platform
  ProviderName: Tuya
  PublisherName: Tuya Inc.
  InvoiceIssuerName: Tuya Inc.
  BillingCurrency: USD
meters:
  - name: cloud_development_package
    description: Contracted Cloud Development Package line scoped to the project.
    unit: month
    aggregation: sum
    dimensions:
      - project
  - name: connected_devices
    description: Devices connected through the Tuya cloud under the project (basis for sizing the package).
    unit: device
    aggregation: max
    dimensions:
      - project
      - region
principles:
  - name: Visibility
    description: Visibility is via the Tuya developer console (project-scoped device counts and API call
      logs); a public FOCUS export is not published.
  - name: Allocation
    description: Allocate Tuya spend per project / product line; Tuya's project model already maps cleanly
      to a product or SKU in your portfolio.
  - name: Optimization
    description: Optimization happens by package right-sizing at contract renewal and by avoiding over-provisioning
      of value-added services (AI, voice, OTA) that are not actively used by the device fleet.
  - name: Accountability
    description: An IoT product or hardware-platform owner manages the Tuya relationship per project;
      finance approves the per-project Cloud Development Package contract.
maintainers:
